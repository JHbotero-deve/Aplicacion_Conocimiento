<form id="ingresoForm">
  <input type="text" id="chapeta" name="chapeta" placeholder="Número de chapeta" required>
  <button type="button" onclick="buscarChapeta()">Buscar</button>

  <input type="text" id="raza" name="raza" placeholder="Raza" required>
  <input type="number" id="edad" name="edad" placeholder="Edad" required>
  <input type="number" id="peso" name="peso" placeholder="Peso" required>
  <input type="date" id="fecha_ingreso" name="fecha_ingreso" required>
  <input type="text" id="estadoICA" name="estadoICA" placeholder="Estado ICA">

  <button type="button" onclick="activarVoz()">🎤 Dictar</button>
  <button type="submit">Ingresar Ganado</button>
</form>

<script src="../services/api.js"></script>
<script>
async function buscarChapeta(){
  const chapeta = document.getElementById("chapeta").value;
  const token = localStorage.getItem("token");
  const res = await fetch("http://localhost:3000/ganado/chapeta/"+chapeta,{
    headers: {"Authorization":"Bearer "+token}
  });
  if(res.ok){
    const datos = await res.json();
    document.getElementById("raza").value = datos.raza;
    document.getElementById("edad").value = datos.edad;
    document.getElementById("peso").value = datos.peso;
    document.getElementById("fecha_ingreso").value = datos.fecha_ingreso;
    document.getElementById("estadoICA").value = datos.estadoica;
  } else {
    alert("Chapeta no encontrada");
  }
}

function activarVoz(){
  const reconocimiento = new(window.SpeechRecognition || window.webkitSpeechRecognition)();
  reconocimiento.lang = "es-CO";
  reconocimiento.start();
  reconocimiento.onresult = (event) => {
    const texto = event.results[0][0].transcript;
    document.getElementById("chapeta").value = texto;
  };
}
</script>
